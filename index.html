<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Playlist</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    font-family: 'Arial', sans-serif;
    color: white;
    overflow: hidden;
    background: radial-gradient(circle at center, #080c20, #000);
}

/* 오로라 */
body::before, body::after {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    mix-blend-mode: screen;
    z-index: -1;
}

body::before {
    background: linear-gradient(120deg, 
        rgba(240,230,140,0.12),
        rgba(120,160,255,0.10),
        rgba(200,100,255,0.10),
        transparent 70%
    );
    animation: aurora1 25s ease-in-out infinite alternate;
}

body::after {
    background: linear-gradient(300deg, 
        rgba(100,200,255,0.08),
        rgba(240,230,140,0.08),
        transparent 70%
    );
    animation: aurora2 30s ease-in-out infinite alternate;
}

@keyframes aurora1 {
    0% { transform: translate(-10%, -10%) rotate(0deg); }
    100% { transform: translate(10%, 10%) rotate(15deg); }
}

@keyframes aurora2 {
    0% { transform: translate(10%, -10%) rotate(0deg); }
    100% { transform: translate(-10%, 10%) rotate(-15deg); }
}

/* 레이아웃 */
.container {
    width: 90%;
    max-width: 900px;
    margin: auto;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    text-align: center;
}

/* 타이틀 */
.title h1 {
    font-size: 32px;
    color: #F0E68C;
    text-shadow: 0 0 10px rgba(240,230,140,0.5);
}

.subtitle {
    font-size: 14px;
    opacity: 0.6;
}

/* 플레이어 */
.player {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 2px solid #F0E68C;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 30px rgba(240,230,140,0.3);
}

.now-title {
    font-size: 16px;
    color: #F0E68C;
}

.now-artist {
    font-size: 12px;
    opacity: 0.6;
}

/* 상태바 */
.status-bar {
    display: flex;
    gap: 20px;
    font-size: 12px;
    opacity: 0.5;
}

/* ⭐⭐⭐ 개선된 컨트롤 ⭐⭐⭐ */
.controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;              /* 간격 증가 */
    padding: 10px 20px;     /* 여유 공간 */
    min-width: 320px;       /* 가로 확장 */
}

.controls button {
    padding: 12px 18px;     /* 버튼 크기 증가 */
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background: #F0E68C;
    cursor: pointer;
    transition: 0.2s;
}

.controls button:hover {
    transform: scale(1.1);
}

.controls input {
    width: 120px;           /* 볼륨 더 넓게 */
}

/* 트랙 */
.tracks {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

.track {
    padding: 18px;
    border-radius: 15px;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(240,230,140,0.15);
}

.track.active {
    background: rgba(240,230,140,0.08);
    border-color: #F0E68C;
}

.track-title {
    font-weight: bold;
    margin-bottom: 5px;
}

.artist {
    font-size: 12px;
    opacity: 0.5;
}

/* 가사 */
.lyrics {
    padding-top: 20px;
    border-top: 1px solid rgba(240,230,140,0.2);
    font-size: 14px;
    opacity: 0.7;
    line-height: 1.6;
}

.highlight {
    color: #F0E68C;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
    <h1>✦ COSMIC PLAYER ✦</h1>
    <p class="subtitle">우주 속 나만의 음악 콘솔</p>
</div>

<div class="player">
    <div class="now-title">NOW PLAYING</div>
    <div class="now-artist">-</div>
</div>

<div class="status-bar">
    <span>🌌 Mood: Dreamy</span>
    <span>🎧 5 Tracks</span>
</div>

<!-- ⭐ 넓어진 컨트롤 -->
<div class="controls">
    <button id="prev">⏮</button>
    <button id="play">▶</button>
    <button id="next">⏭</button>
    🔊 <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
</div>

<div class="tracks">
    <div class="track" data-index="0">
        <div class="track-title">Compass</div>
        <div class="artist">Mili</div>
    </div>
    <div class="track" data-index="1">
        <div class="track-title">소우주</div>
        <div class="artist">BTS</div>
    </div>
    <div class="track" data-index="2">
        <div class="track-title">고스트 애비뉴</div>
        <div class="artist">Eve</div>
    </div>
    <div class="track" data-index="3">
        <div class="track-title">Meteor</div>
        <div class="artist">창모</div>
    </div>
    <div class="track" data-index="4">
        <div class="track-title">Counting Stars</div>
        <div class="artist">OneRepublic</div>
    </div>
</div>

<div class="lyrics">
    흘러가는 별빛 사이로<br>
    <span class="highlight">우린 서로를 비추는 작은 우주</span><br>
    끝없이 퍼지는 우리의 이야기
</div>

</div>

<script>
const songs = [
    {title:"Compass", artist:"Mili", src:"compass.mp3"},
    {title:"소우주", artist:"BTS", src:"sowooju.mp3"},
    {title:"고스트 애비뉴", artist:"Eve", src:"ghost.mp3"},
    {title:"Meteor", artist:"창모", src:"meteor.mp3"},
    {title:"Counting Stars", artist:"OneRepublic", src:"countingstars.mp3"}
];

let current = -1;
const audio = new Audio();

const titleEl = document.querySelector(".now-title");
const artistEl = document.querySelector(".now-artist");
const tracks = document.querySelectorAll(".track");

const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const volume = document.getElementById("volume");

function loadSong(index) {
    current = index;
    audio.src = songs[index].src;

    titleEl.textContent = songs[index].title;
    artistEl.textContent = songs[index].artist;

    tracks.forEach(t => t.classList.remove("active"));
    tracks[index].classList.add("active");

    audio.play();
    playBtn.textContent = "⏸";
}

tracks.forEach(track => {
    track.addEventListener("click", () => {
        loadSong(Number(track.dataset.index));
    });
});

playBtn.addEventListener("click", () => {
    if(current === -1) return;

    if(audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
    } else {
        audio.pause();
        playBtn.textContent = "▶";
    }
});

nextBtn.addEventListener("click", () => {
    if(current === -1) return;
    current = (current + 1) % songs.length;
    loadSong(current);
});

prevBtn.addEventListener("click", () => {
    if(current === -1) return;
    current = (current - 1 + songs.length) % songs.length;
    loadSong(current);
});

volume.addEventListener("input", () => {
    audio.volume = volume.value;
});

audio.addEventListener("ended", () => {
    current = (current + 1) % songs.length;
    loadSong(current);
});
</script>

</body>
</html>
